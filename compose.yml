x-backend-env: &backend-env
  DOMAIN: ${DOMAIN}
  FRONTEND_HOST: ${FRONTEND_HOST?Variable not set}
  ENVIRONMENT: ${ENVIRONMENT}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
  SECRET_KEY: ${SECRET_KEY?Variable not set}
  FIRST_SUPERUSER: ${FIRST_SUPERUSER?Variable not set}
  FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD?Variable not set}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL}
  POSTGRES_SERVER: db
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER?Variable not set}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
  SENTRY_DSN: ${SENTRY_DSN}
  LOGGING_LEVEL: ${LOGGING_LEVEL}
  STRUCTURED_LOGGING: ${STRUCTURED_LOGGING}
  MINIO_URL: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER?Variable not set}
  MINIO_ACCESS_SECRET: ${MINIO_ROOT_PASSWORD?Variable not set}
  MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}

x-frontend-base: &frontend-base
  restart: unless-stopped
  networks:
    - traefik-public
    - default
  build:
    context: .
    dockerfile: frontend/Dockerfile
    args:
      - VITE_API_URL=https://api.${DOMAIN?Variable not set}
      - NODE_ENV=production
  labels:
    - traefik.enable=true
    - traefik.docker.network=traefik-public
    - traefik.constraint-label=traefik-public
    - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80
    # Middleware for HTTPS redirect
    - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.middlewares=https-redirect

services:

  db:
    image: postgres:18
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  adminer:
    image: adminer
    restart: unless-stopped
    networks:
      - traefik-public
      - default
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.rule=Host(`adminer.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.rule=Host(`adminer.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls.certresolver=le
      - traefik.http.services.${STACK_NAME?Variable not set}-adminer.loadbalancer.server.port=8080

  minio:
    image: minio/minio
    restart: unless-stopped
    networks:
      - traefik-public
      - default
    volumes:
      - minio-data:/data
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER?Variable not set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD?Variable not set}
      MINIO_SERVER_URL: "https://minio.${DOMAIN?Variable not set}"
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-minio.loadbalancer.server.port=9000
      - traefik.http.routers.${STACK_NAME?Variable not set}-minio-http.rule=Host(`minio.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-minio-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-minio-https.rule=Host(`minio.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-minio-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-minio-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-minio-https.tls.certresolver=le
      - traefik.http.routers.${STACK_NAME?Variable not set}-minio-http.middlewares=https-redirect

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: unless-stopped
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
      minio:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    environment:
      <<: *backend-env

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

    build:
      context: .
      dockerfile: backend/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls.certresolver=le

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.middlewares=https-redirect

  frontend-landing:
    <<: *frontend-base
    image: '${DOCKER_IMAGE_FRONTEND_LANDING}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - TARGET=landing
    labels:
      - traefik.enable=true
      - traefik.http.routers.landing-http.rule=Host(`landing.${DOMAIN?Variable not set}`)
      - traefik.http.routers.landing-https.rule=Host(`landing.${DOMAIN?Variable not set}`)
      - traefik.http.routers.landing-https.tls=true
      - traefik.http.routers.landing-https.tls.certresolver=le
      - traefik.http.services.landing.loadbalancer.server.port=80

  frontend-impactmaker:
    <<: *frontend-base
    image: '${DOCKER_IMAGE_FRONTEND_IMPACTMAKER}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - TARGET=impactmaker
    labels:
      - traefik.enable=true
      - traefik.http.routers.impactmaker-http.rule=Host(`impactmaker.${DOMAIN?Variable not set}`)
      - traefik.http.routers.impactmaker-https.rule=Host(`impactmaker.${DOMAIN?Variable not set}`)
      - traefik.http.routers.impactmaker-https.tls=true
      - traefik.http.routers.impactmaker-https.tls.certresolver=le
      - traefik.http.services.impactmaker.loadbalancer.server.port=80

  frontend-changemaker:
    <<: *frontend-base
    image: '${DOCKER_IMAGE_FRONTEND_CHANGEMAKER}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - TARGET=changemaker
    labels:
      - traefik.enable=true
      - traefik.http.routers.changemaker-http.rule=Host(`changemaker.${DOMAIN?Variable not set}`)
      - traefik.http.routers.changemaker-https.rule=Host(`changemaker.${DOMAIN?Variable not set}`)
      - traefik.http.routers.changemaker-https.tls=true
      - traefik.http.routers.changemaker-https.tls.certresolver=le
      - traefik.http.services.changemaker.loadbalancer.server.port=80

  frontend-verifier:
    <<: *frontend-base
    image: '${DOCKER_IMAGE_FRONTEND_VERIFIER}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - TARGET=verifier
    labels:
      - traefik.enable=true
      - traefik.http.routers.verifier-http.rule=Host(`verifier.${DOMAIN?Variable not set}`)
      - traefik.http.routers.verifier-https.rule=Host(`verifier.${DOMAIN?Variable not set}`)
      - traefik.http.routers.verifier-https.tls=true
      - traefik.http.routers.verifier-https.tls.certresolver=le
      - traefik.http.services.verifier.loadbalancer.server.port=80

  frontend-gov:
    <<: *frontend-base
    image: '${DOCKER_IMAGE_FRONTEND_GOV}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - TARGET=gov
    labels:
      - traefik.enable=true
      - traefik.http.routers.gov-http.rule=Host(`gov.${DOMAIN?Variable not set}`)
      - traefik.http.routers.gov-https.rule=Host(`gov.${DOMAIN?Variable not set}`)
      - traefik.http.routers.gov-https.tls=true
      - traefik.http.routers.gov-https.tls.certresolver=le
      - traefik.http.services.gov.loadbalancer.server.port=80

  frontend-partner:
    <<: *frontend-base
    image: '${DOCKER_IMAGE_FRONTEND_PARTNER}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - TARGET=partner
    labels:
      - traefik.enable=true
      - traefik.http.routers.partner-http.rule=Host(`partner.${DOMAIN?Variable not set}`)
      - traefik.http.routers.partner-https.rule=Host(`partner.${DOMAIN?Variable not set}`)
      - traefik.http.routers.partner-https.tls=true
      - traefik.http.routers.partner-https.tls.certresolver=le
      - traefik.http.services.partner.loadbalancer.server.port=80

  frontend-admin:
    <<: *frontend-base
    image: '${DOCKER_IMAGE_FRONTEND_ADMIN}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - TARGET=admin
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin-http.rule=Host(`admin.${DOMAIN?Variable not set}`)
      - traefik.http.routers.admin-https.rule=Host(`admin.${DOMAIN?Variable not set}`)
      - traefik.http.routers.admin-https.tls=true
      - traefik.http.routers.admin-https.tls.certresolver=le
      - traefik.http.services.admin.loadbalancer.server.port=80

volumes:
  app-db-data:
  minio-data:

networks:
  traefik-public:
    # Allow setting it to false for testing
    external: true
