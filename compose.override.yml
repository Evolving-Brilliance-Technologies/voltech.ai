x-frontend-dev: &frontend-dev
  restart: "no"
  build:
    context: .
    dockerfile: frontend/Dockerfile
    target: build-stage
    args:
      - VITE_API_URL=http://localhost:8000
      - NODE_ENV=development
  develop:
    watch:
      - path: ./frontend/src
        action: sync
        target: /app/frontend/src
        ignore:
          - node_modules
      - path: ./frontend/package.json
        action: rebuild
      - path: ./frontend/bun.lock
        action: rebuild
      - path: ./frontend/vite.config.ts
        action: rebuild

services:

  # Local services are available on their ports, but also available on:
  # http://api.localhost.tiangolo.com: backend
  # http://dashboard.localhost.tiangolo.com: frontend
  # etc. To enable it, update .env, set:
  # DOMAIN=localhost.tiangolo.com
  proxy:
    image: traefik:3.6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
      - "8090:8080"
    # Duplicate the command from compose.yml to add --api.insecure=true
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker
      # Add a constraint to only use services with the label for this stack
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed
      - --providers.docker.exposedbydefault=false
      # Create an entrypoint "http" listening on port 80
      - --entrypoints.http.address=:80
      # Create an entrypoint "https" listening on port 443
      - --entrypoints.https.address=:443
      # Enable the access log, with HTTP requests
      - --accesslog
      # Enable the Traefik log, for configurations and errors
      - --log
      # Enable debug logging for local development
      - --log.level=DEBUG
      # Enable the Dashboard and API
      - --api
      # Enable the Dashboard and API in insecure mode for local development
      - --api.insecure=true
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      # Dummy https-redirect middleware that doesn't really redirect, only to
      # allow running it locally
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default

  db:
    restart: "no"
    ports:
      - "5432:5432"

  adminer:
    restart: "no"
    ports:
      - "8080:8080"
  
  minio:
    restart: "no"
    ports:
      - "9001:9001"
      - "9000:9000"
    command: server /data --console-address ":9001"
    environment:
      MINIO_BROWSER_REDIRECT_URL: "http://minio.${DOMAIN?Variable not set}:9001"
      MINIO_SERVER_URL: "http://minio.${DOMAIN?Variable not set}:9000"

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # In dev, skip the production start.sh and run with --reload directly
    entrypoint: ["fastapi", "run", "--reload", "app/main.py"]
    develop:
      watch:
        - path: ./backend/app
          action: sync+restart
          target: /app/backend/app
          ignore:
            - __pycache__
            - "*.pyc"
        - path: ./backend/pyproject.toml
          action: rebuild
    # TODO: remove once coverage is done locally
    volumes:
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend-landing:
    <<: *frontend-dev
    ports:
      - "3000:3000"
    entrypoint: ["bun", "run", "dev:landing", "--", "--host", "0.0.0.0"]
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.landing-http.rule=Host(`landing.${DOMAIN?Variable not set}`)
      - traefik.http.services.landing.loadbalancer.server.port=3000

  frontend-impactmaker:
    <<: *frontend-dev
    ports:
      - "3001:3001"
    entrypoint: ["bun", "run", "dev:impactmaker", "--", "--host", "0.0.0.0"]
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.impactmaker-http.rule=Host(`impactmaker.${DOMAIN?Variable not set}`)
      - traefik.http.services.impactmaker.loadbalancer.server.port=3001

  frontend-changemaker:
    <<: *frontend-dev
    ports:
      - "3002:3002"
    entrypoint: ["bun", "run", "dev:changemaker", "--", "--host", "0.0.0.0"]
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.changemaker-http.rule=Host(`changemaker.${DOMAIN?Variable not set}`)
      - traefik.http.services.changemaker.loadbalancer.server.port=3002

  frontend-verifier:
    <<: *frontend-dev
    ports:
      - "3003:3003"
    entrypoint: ["bun", "run", "dev:verifier", "--", "--host", "0.0.0.0"]
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.verifier-http.rule=Host(`verifier.${DOMAIN?Variable not set}`)
      - traefik.http.services.verifier.loadbalancer.server.port=3003

  frontend-gov:
    <<: *frontend-dev
    ports:
      - "3004:3004"
    entrypoint: ["bun", "run", "dev:gov", "--", "--host", "0.0.0.0"]
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.gov-http.rule=Host(`gov.${DOMAIN?Variable not set}`)
      - traefik.http.services.gov.loadbalancer.server.port=3004

  frontend-partner:
    <<: *frontend-dev
    ports:
      - "3005:3005"
    entrypoint: ["bun", "run", "dev:partner", "--", "--host", "0.0.0.0"]
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.partner-http.rule=Host(`partner.${DOMAIN?Variable not set}`)
      - traefik.http.services.partner.loadbalancer.server.port=3005

  frontend-admin:
    <<: *frontend-dev
    ports:
      - "3006:3006"
    entrypoint: ["bun", "run", "dev:admin", "--", "--host", "0.0.0.0"]
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.admin-http.rule=Host(`admin.${DOMAIN?Variable not set}`)
      - traefik.http.services.admin.loadbalancer.server.port=3006

  playwright:
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - backend
      - mailcatcher
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend:8000
      - MAILCATCHER_HOST=http://mailcatcher:1080
      # For the reports when run locally
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI}
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
      - ./frontend/test-results:/app/frontend/test-results
    ports:
      - 9323:9323

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false
