name: Issue Manager

on:
    schedule:
        - cron: "0 9 * * *" # Run daily at 9am UTC
    issue_comment:
        types:
            - created
    issues:
        types:
            - labeled
    pull_request_target:
        types:
            - labeled
    workflow_dispatch:

permissions:
    issues: write
    pull-requests: write

jobs:
    issue-manager:
        runs-on: ubuntu-latest
        steps:
            - uses: tiangolo/issue-manager@0.6.0
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  config: >
                      {
                        "answered": {
                          "delay": 604800,
                          "message": "This issue has been marked as answered. Closing automatically. Feel free to reopen if you have additional questions."
                        },
                        "waiting": {
                          "delay": 1209600,
                          "message": "This issue has been waiting for a response for 2 weeks. Closing due to inactivity. Feel free to reopen with additional information.",
                          "reminder": {
                            "before": "P3D",
                            "message": "👋 Heads-up: this issue will be closed in 3 days unless there's new activity."
                          }
                        },
                        "invalid": {
                          "delay": 0,
                          "message": "This issue was marked as invalid and has been closed."
                        },
                        "wontfix": {
                          "delay": 0,
                          "message": "This issue was marked as won't fix and has been closed."
                        }
                      }
