name: Pre-commit

on:
    pull_request:
        types:
            - opened
            - synchronize

env:
    # Check if we have a token that can push
    HAS_PUSH_TOKEN: ${{ secrets.PRE_COMMIT_TOKEN != '' }}

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            # Checkout with push token if available, otherwise read-only
            - uses: actions/checkout@v4
              if: env.HAS_PUSH_TOKEN == 'true'
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 0
                  token: ${{ secrets.PRE_COMMIT_TOKEN }}

            - uses: actions/checkout@v4
              if: env.HAS_PUSH_TOKEN != 'true'
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 0

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Setup uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Backend Dependencies
              run: uv sync
              working-directory: backend

            - name: Install pre-commit
              run: uv tool install pre-commit

            - name: Run pre-commit
              id: precommit
              run: pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD --show-diff-on-failure
              continue-on-error: true

            - name: Commit and push changes
              if: env.HAS_PUSH_TOKEN == 'true' && github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "🎨 Auto format"
                    git push
                  fi

            - name: Warn if no push token
              if: env.HAS_PUSH_TOKEN != 'true' && steps.precommit.outcome == 'failure'
              run: |
                  echo "::warning::Pre-commit made changes but cannot auto-push. Add PRE_COMMIT_TOKEN secret to enable auto-formatting."
                  echo "Run 'pre-commit run --all-files' locally and push the changes."

            - name: Error out on pre-commit errors
              if: steps.precommit.outcome == 'failure'
              run: exit 1
